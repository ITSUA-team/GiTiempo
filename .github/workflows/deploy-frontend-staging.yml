name: Deploy frontend staging

on:
  push:
    branches:
      - staging
    paths:
      - apps/user-web/**
      - apps/admin-web/**
      - packages/shared/**
      - packages/web-config/**
      - packages/web-shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/actions/workspace-check/**
      - .github/scripts/detect-ci-targets.mjs
      - .github/workflows/deploy-frontend-staging-reusable.yml
      - .github/workflows/deploy-frontend-staging.yml
  workflow_dispatch:
    inputs:
      target:
        description: Frontend app to deploy.
        required: true
        default: both
        type: choice
        options:
          - user-web
          - admin-web
          - both
      ref:
        description: Optional branch, tag, or SHA to deploy.
        required: false
        type: string

permissions:
  contents: read

jobs:
  detect:
    name: Detect frontend deploy targets
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Detect frontend targets
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          FRONTEND_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || '' }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            printf '' | node .github/scripts/detect-ci-targets.mjs frontend-deploy
            exit 0
          fi

          zero_sha="0000000000000000000000000000000000000000"
          {
            if [ "$BEFORE_SHA" = "$zero_sha" ]; then
              git ls-tree -r --name-only "$GITHUB_SHA"
            else
              git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA"
            fi
          } | node .github/scripts/detect-ci-targets.mjs frontend-deploy

  deploy:
    name: Deploy ${{ matrix.app_name }} staging
    needs: detect
    if: needs.detect.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/deploy-frontend-staging-reusable.yml
    secrets: inherit
    with:
      app_name: ${{ matrix.app_name }}
      app_path: ${{ matrix.app_path }}
      package_name: ${{ matrix.package_name }}
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
