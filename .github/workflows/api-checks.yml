name: API checks

on:
  pull_request:
    paths:
      - apps/api/**
      - packages/shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .dockerignore
      - apps/api/Dockerfile
      - apps/api/compose.e2e.yml
      - apps/api/compose.smoke.yml
      - deploy/api/**
      - scripts/api-e2e-docker.sh
      - scripts/api-smoke-docker.sh
      - .github/workflows/api-checks.yml
      - .github/workflows/deploy-api.yml

permissions:
  contents: read

jobs:
  api-checks:
    name: API checks
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm exec turbo run lint --filter=@gitiempo/api

      - name: Typecheck API
        run: pnpm exec turbo run typecheck --filter=@gitiempo/api

      - name: Test API
        run: pnpm exec turbo run test --filter=@gitiempo/api

      - name: Run Docker-backed API e2e
        run: pnpm api:e2e:docker
