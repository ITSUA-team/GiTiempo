name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1
  PUBLIC_SITE_URL: https://landing-ci.invalid
  PUBLIC_USER_APP_URL: https://user-ci.invalid/login
  PUBLIC_ADMIN_APP_URL: https://admin-ci.invalid

jobs:
  detect:
    name: Detect CI targets
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect affected packages
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' |
            node .github/scripts/detect-ci-targets.mjs ci

      - name: Verify CI target detector
        run: node --test .github/scripts/detect-ci-targets.test.mjs

  checks:
    name: Check ${{ matrix.package_name }}
    needs: detect
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run workspace check
        uses: ./.github/actions/workspace-check
        with:
          package-name: ${{ matrix.package_name }}
          run-build: ${{ matrix.run_build }}
          run-api-e2e: ${{ matrix.run_api_e2e }}
          run-browser: ${{ matrix.run_browser }}

  ci-required:
    name: CI required
    needs:
      - detect
      - checks
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify required CI result
        env:
          DETECT_RESULT: ${{ needs.detect.result }}
          CHECKS_RESULT: ${{ needs.checks.result }}
        run: |
          set -euo pipefail

          if [ "$DETECT_RESULT" != "success" ]; then
            exit 1
          fi

          case "$CHECKS_RESULT" in
            success|skipped)
              exit 0
              ;;
            *)
              exit 1
              ;;
          esac
