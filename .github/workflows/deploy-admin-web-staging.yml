name: Deploy admin-web staging

on:
  push:
    branches:
      - staging
    paths:
      - apps/admin-web/**
      - packages/shared/**
      - packages/web-config/**
      - packages/web-shared/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-frontend-staging-reusable.yml
      - .github/workflows/deploy-admin-web-staging.yml

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-frontend-staging-reusable.yml
    secrets: inherit
    with:
      app_name: admin-web
      app_path: apps/admin-web
      package_name: admin-web
