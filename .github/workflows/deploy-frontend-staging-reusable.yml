name: Deploy frontend staging reusable

on:
  workflow_call:
    inputs:
      app_name:
        description: Frontend app name for logs and concurrency.
        required: true
        type: string
      app_path:
        description: Frontend app directory containing wrangler.toml.
        required: true
        type: string
      package_name:
        description: pnpm workspace package name.
        required: true
        type: string
      ref:
        description: Optional branch, tag, or SHA to deploy.
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.app_name }} staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: frontend-staging-${{ inputs.app_name }}
      cancel-in-progress: false
    env:
      CI: true
      TURBO_TELEMETRY_DISABLED: 1
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_ADMIN_APP_URL: ${{ vars.VITE_ADMIN_APP_URL }}
      VITE_USER_APP_URL: ${{ vars.VITE_USER_APP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Validate staging environment
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
        run: |
          set -euo pipefail

          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              printf '::error::%s is required\n' "$name"
              exit 1
            fi
          }

          require_env CLOUDFLARE_ACCOUNT_ID
          require_env CLOUDFLARE_API_TOKEN
          require_env VITE_API_BASE_URL
          require_env VITE_ADMIN_APP_URL
          require_env VITE_USER_APP_URL
          require_env VITE_FIREBASE_API_KEY
          require_env VITE_FIREBASE_APP_ID
          require_env VITE_FIREBASE_AUTH_DOMAIN
          require_env VITE_FIREBASE_MESSAGING_SENDER_ID
          require_env VITE_FIREBASE_PROJECT_ID
          require_env VITE_FIREBASE_STORAGE_BUCKET

      - name: Run ${{ inputs.app_name }} checks
        uses: ./.github/actions/workspace-check
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
        with:
          package-name: ${{ inputs.package_name }}
          run-build: 'true'
          run-api-e2e: 'false'

      - name: Deploy ${{ inputs.app_name }} to Cloudflare Workers staging
        working-directory: ${{ inputs.app_path }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy --env staging
