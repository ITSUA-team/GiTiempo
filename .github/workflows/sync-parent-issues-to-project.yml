name: Sync Parent Issues To Project

on:
  issues:
    types:
      - opened
      - reopened
      - milestoned

permissions:
  contents: read
  issues: read

jobs:
  sync-parent-issue:
    # Projects v2 automation needs a token with project access.
    runs-on: ubuntu-latest
    env:
      PARENT_ID: ''
      EXISTING_ITEM_ID: ''
      ISSUE_ID: ''
      ITEM_ID: ''
    steps:
      - name: Resolve issue metadata
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          OWNER: ITSUA-team
          REPO: GiTiempo
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh api graphql -f query='query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              issue(number: $number) {
                id
                number
                parent { id number }
                projectItems(first: 20) {
                  nodes {
                    id
                    project { id number title }
                  }
                }
              }
            }
          }' -f owner="$OWNER" -f repo="$REPO" -F number="$ISSUE_NUMBER" > issue-data.json

          echo "ISSUE_ID=$(jq -r '.data.repository.issue.id' issue-data.json)" >> "$GITHUB_ENV"
          echo "PARENT_ID=$(jq -r '.data.repository.issue.parent.id // empty' issue-data.json)" >> "$GITHUB_ENV"

          existing_item_id="$(jq -r '.data.repository.issue.projectItems.nodes[] | select(.project.number == 7 and .project.title == "GiTimpo") | .id' issue-data.json | head -n 1)"
          if [ -n "$existing_item_id" ]; then
            echo "EXISTING_ITEM_ID=$existing_item_id" >> "$GITHUB_ENV"
          fi

      - name: Skip child issues
        if: ${{ env.PARENT_ID != '' }}
        run: |
          echo "Issue is a child sub-issue. Skipping project auto-add for parent-only sync."

      - name: Add parent issue to project
        if: ${{ env.PARENT_ID == '' && env.EXISTING_ITEM_ID == '' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          PROJECT_ID: PVT_kwDOCqTlmM4BU1Mp
          ISSUE_ID: ${{ env.ISSUE_ID }}
        run: |
          item_id="$(gh api graphql -f query='mutation($project: ID!, $issue: ID!) {
            addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
              item { id }
            }
          }' -f project="$PROJECT_ID" -f issue="$ISSUE_ID" --jq '.data.addProjectV2ItemById.item.id')"

          echo "ITEM_ID=$item_id" >> "$GITHUB_ENV"

      - name: Reuse existing project item
        if: ${{ env.PARENT_ID == '' && env.EXISTING_ITEM_ID != '' }}
        run: |
          echo "ITEM_ID=${EXISTING_ITEM_ID}" >> "$GITHUB_ENV"

      - name: Set project status to Backlog
        if: ${{ env.PARENT_ID == '' && env.ITEM_ID != '' }}
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_TOKEN }}
          ITEM_ID: ${{ env.ITEM_ID }}
          PROJECT_ID: PVT_kwDOCqTlmM4BU1Mp
          STATUS_FIELD_ID: PVTSSF_lADOCqTlmM4BU1MpzhEhrEI
          BACKLOG_OPTION_ID: f75ad846
        run: |
          gh project item-edit \
            --id "$ITEM_ID" \
            --project-id "$PROJECT_ID" \
            --field-id "$STATUS_FIELD_ID" \
            --single-select-option-id "$BACKLOG_OPTION_ID"
