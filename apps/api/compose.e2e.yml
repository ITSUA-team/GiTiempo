services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitiempo_e2e
      POSTGRES_USER: gitiempo
      POSTGRES_PASSWORD: gitiempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitiempo -d gitiempo_e2e"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - api-e2e

  api-e2e:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: build
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://gitiempo:gitiempo@postgres:5432/gitiempo_e2e
      JWT_ACCESS_SECRET: test-access-secret-32-characters-min
      JWT_REFRESH_SECRET: test-refresh-secret-32-characters-min
      INVITES_EMAIL_CONSOLE_FALLBACK: "true"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - >-
        pnpm --filter @gitiempo/api db:migrate &&
        pnpm --filter @gitiempo/api db:seed &&
        pnpm --filter @gitiempo/api test:e2e
    networks:
      - api-e2e

networks:
  api-e2e:
    driver: bridge
