services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitiempo_smoke
      POSTGRES_USER: gitiempo
      POSTGRES_PASSWORD: gitiempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitiempo -d gitiempo_smoke"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - api-smoke

  migrate:
    image: ${API_IMAGE:-gitiempo-api:local}
    environment:
      DATABASE_URL: postgresql://gitiempo:gitiempo@postgres:5432/gitiempo_smoke
    command: ["node", "dist/src/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api-smoke

  api:
    image: ${API_IMAGE:-gitiempo-api:local}
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://gitiempo:gitiempo@postgres:5432/gitiempo_smoke
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      LOG_LEVEL: info
      LOG_EXTENDED: "false"
      SWAGGER_ENABLED: "false"
      JWT_ACCESS_SECRET: test-access-secret-32-characters-min
      JWT_REFRESH_SECRET: test-refresh-secret-32-characters-min
      INVITES_EMAIL_CONSOLE_FALLBACK: "true"
      FIREBASE_PROJECT_ID: gitiempo-smoke
      FIREBASE_CLIENT_EMAIL: smoke@example.com
      FIREBASE_PRIVATE_KEY: smoke-private-key
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/commons/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - api-smoke

  smoke:
    image: node:24-bookworm-slim
    depends_on:
      api:
        condition: service_healthy
    command:
      - node
      - -e
      - >-
        fetch('http://api:3000/commons/health/ready').then((res) => {
          if (!res.ok) process.exit(1);
        }).catch(() => process.exit(1));
    networks:
      - api-smoke

networks:
  api-smoke:
    driver: bridge
