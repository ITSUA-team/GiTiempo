"$schema" = "../../node_modules/wrangler/config-schema.json"
name = "gitiempo-user-web"
compatibility_date = "2026-05-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[env.staging]
name = "gitiempo-user-web-staging"
workers_dev = false

[env.staging.assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[env.staging.routes]]
pattern = "gitiempo.itsua.dev"
zone_name = "itsua.dev"
custom_domain = true
