schema: spec-driven

context: |
  Monorepo: GiTiempo (pnpm workspaces + Turborepo)
  Backend app: apps/api using NestJS, Drizzle ORM, PostgreSQL, and OpenAPI export
  Frontend apps: apps/user-web and apps/admin-web using Vue 3, Pinia, PrimeVue v4, Tailwind CSS v4, and Vue Router
  Shared packages: packages/shared for Zod contracts and packages/web-config for shared frontend theme/bootstrap
  Auth direction: frontend authenticates with Firebase Auth and the backend verifies identity and serves application APIs

rules:
  proposal:
    - Reference the relevant GitHub issue or parent issue when known.
    - State which layer is affected: backend, frontend, shared, or multiple.
    - Call out if the change modifies contracts or authentication behavior.
  specs:
    - Use behavior-first requirements with Given/When/Then scenarios.
    - Each domain gets its own spec at openspec/specs/<domain>/spec.md.
    - Avoid implementation details such as concrete class names unless behavior depends on them.
  design:
    - Group planned file changes by app or package.
    - Reference the nearest AGENTS.md instructions for affected apps.
    - Explain backend/frontend coordination when a change spans multiple layers.
  tasks:
    - Group tasks by area: API, user-web, admin-web, shared, docs.
    - Keep tasks small enough to complete in one focused session when possible.
    - Include verification tasks for each touched area.
