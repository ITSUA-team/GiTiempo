map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream gitiempo_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name gitiempo-api.itsua.dev;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gitiempo-api.itsua.dev;

    ssl_certificate /etc/letsencrypt/live/gitiempo-api.itsua.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gitiempo-api.itsua.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:gitiempo_api_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    server_tokens off;
    client_max_body_size 10m;

    access_log /var/log/nginx/gitiempo-api.access.log;
    error_log /var/log/nginx/gitiempo-api.error.log warn;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass http://gitiempo_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_redirect off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
