services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - api-internal

  migrate:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: "no"
    env_file:
      - ${API_ENV_FILE:-.env}
    environment:
      PORT: "3000"
    command: ["node", "dist/src/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api-internal

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    env_file:
      - ${API_ENV_FILE:-.env}
    environment:
      PORT: "3000"
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/commons/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - api-internal

networks:
  api-internal:
    driver: bridge

volumes:
  postgres_data:
